name: AutoSD Build
on:
  workflow_dispatch: 
  pull_request_target:
    types: [opened, reopened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main
jobs:
  autosd-build:
    # uses: eclipse-score/cicd-workflows/.github/workflows/qnx-build.yml@c1c90b1a82a1fab0fc202979dde6686b2162d5a8 # v0.0.0
    uses: odra/cicd-workflows/.github/workflows/autosd-build.yml@autosd-ci
    permissions:
      contents: read
      pull-requests: read
    strategy:
      matrix:
        config: ['x86_64-qnx']
    with:
      bazel-target: '//src/... //examples/...'
      bazel-test-target: '//src/... //examples/...'
      bazel-config: ${{ matrix.config }}
      bazel-disk-cache: ${{ github.workflow }}-${{ github.job }}-${{ matrix.config }} 
